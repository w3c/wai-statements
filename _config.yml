# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
title: "Web Accessibility Initiative (WAI)"
description: >
  The Website of the World Wide Web Consortium’s Web Accessibility Initiative.
baseurl: "/wai-statements" # the subpath of your site (for GitHub Pages)
url: "https://w3c.github.io" # the base hostname & protocol for your site (for GitHub Pages)
author: w3c_wai
exclude:
  - "_external"
  - "Gemfile"
  - "Gemfile.lock"
  - "README.md"
  - "w3c.json"
  - "node_modules"
repository: w3c/wai-statements
branch: master

# Build settings
markdown: kramdown
kramdown:
  toc_levels: 2..3
  input: GFM
  syntax_highlighter: rouge
highlighter: rouge

theme: wai-website-theme

defaults:
  -
    scope:
      path: ""
    values:
      layout: default
      github:
        repository: w3c/wai-statements
        branch: master